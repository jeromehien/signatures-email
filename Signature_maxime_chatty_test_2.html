<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Signature Email</title>
</head>
<body style="margin:0; padding:40px; background:#ffffff;">

<table cellspacing="0" cellpadding="0" border="0" width="577" style="width:577px; max-width:577px; border-collapse:collapse; font-family:Arial, Helvetica, sans-serif;">
  <tbody>
    <tr>
      <td style="padding:0;">

        <table cellspacing="0" cellpadding="0" border="0" width="100%" style="border-collapse:collapse;">

            <tr>

              <td width="137" valign="top" style="width:137px; padding:0; text-align:center;">

                     width="90"
                     height="68"
                     alt=""
                     border="0"
                     style="display:block; margin:0 auto; border:0;">
              </td>

              <!-- Bloc texte -->
              <td width="440" valign="top" style="width:440px; padding:0; font-family:Arial, Helvetica, sans-serif; color:#555555;">

                <table cellspacing="0" cellpadding="0" border="0" width="100%" style="border-collapse:collapse;">

                    <tr>

                        <span style="font-weight:bold; color:#005696;">Maxime CHATTY</span>
                      </td>
                    </tr>

                    <!-- Fonction -->
                    <tr>
                      <td style="padding:0 0 7px 0; font-size:13px; line-height:18px; border-bottom:2px solid #ee2e24; font-family:Arial, Helvetica, sans-serif;">
                        <span style="font-weight:bold; letter-spacing:2px; color:#555555;">Dirigeant</span>
                      </td>
                    </tr>

                    <!-- Téléphone -->
                    <tr>
                      <td style="padding:7px 0 0 0; font-size:13px; line-height:18px; font-family:Arial, Helvetica, sans-serif; color:#555555;">
                        <a href="tel:0786116600" style="color:#555555; text-decoration:none;">07 86 11 66 00</a>
                      </td>
                    </tr>

                    <!-- Adresse -->
                    <tr>
                      <td style="padding:0; font-size:13px; line-height:18px; font-family:Arial, Helvetica, sans-serif; color:#555555;">
                        21, Rue du Général Giraud, 76000 Rouen
                      </td>
                    </tr>

                    <!-- Site -->
                    <tr>
                      <td style="padding:2px 0 0 0; font-size:12px; line-height:18px; font-family:Arial, Helvetica, sans-serif;">

                      </td>
                    </tr>

                    <!-- Rejoignez -->
                    <tr>
                      <td style="padding:8px 0 0 0; font-size:13px; line-height:18px; font-family:Arial, Helvetica, sans-serif; color:#9B9B9B;">
                        <table cellspacing="0" cellpadding="0" border="0" style="border-collapse:collapse;">
                          <tbody>
                            <tr>
                              <td valign="middle" style="padding:0 6px 0 0;">

                              </td>
                              <td valign="middle" style="font-size:13px; line-height:18px; font-family:Arial, Helvetica, sans-serif; color:#9B9B9B;">

                        <img src="https://atelieremili.img.email/images/69ce64f33f252.png"
